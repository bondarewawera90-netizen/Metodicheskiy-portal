<body>

<div class="footer">🕊️ Все задания структурированы по уровням: базовый, повышенный, высокий. Нажмите 📋 чтобы скопировать задание.</div>

<script>
function copyText(text, btn) { navigator.clipboard.writeText(text); btn.innerHTML = '✓'; setTimeout(() => { btn.innerHTML = '📋'; }, 1500); }

const tasksData = {
    7: [
        ["Информация и информационные процессы", "Базовый", "Задание «Данные или информация?» Заполните таблицу. Записи: «36,6»; «7А – кабинет 24»; «+7 °C»; «01000001»; фотография расписания; слово «ветер». Укажите: данные или информация? При каком условии станут информацией?"],
        ["Информация и информационные процессы", "Повышенный", "Задание «Один знак – разный смысл». Сравните две ситуации: ученик видит «7А – кабинет 24» перед уроком / посторонний человек. Для кого информация, для кого данные? Почему ценность разная?"],
        ["Информация и информационные процессы", "Высокий", "Задание «Информационный маршрут». Выберите школьную ситуацию (переход в кабинет, получение ДЗ, запись на кружок, поиск книги). Опишите путь: источник → сообщение → форма → канал → получатель → результат. Где возможны потери?"],
        ["Представление информации", "Базовый", "Задание «Расшифруй сообщение». Код: А=00, Б=01, В=10, Г=11. Расшифруйте 00 10 01 11. Закодируйте «БАГ». Почему без таблицы восстановить нельзя?"],
        ["Представление информации", "Повышенный", "Задание «Исправь код». Ученик закодировал: книга-0, ручка-1, тетрадь-10, линейка-11. Сообщение «101» неоднозначно. Найдите проблему. Предложите исправленный вариант для однозначности."],
        ["Представление информации", "Высокий", "Задание «Код для школьного квеста». 8 объектов: кабинет, библиотека, столовая, спортзал, актовый зал, лестница, вход, гардероб. Разработайте двоичный код (однозначный, минимальной длины). Объясните выбор."],
        ["Кодирование и объём информации", "Базовый", "Задание «Сколько бит нужно?» Алфавит из 16 символов, сообщение из 12 символов. Определите бит на символ и общий объём."],
        ["Кодирование и объём информации", "Повышенный", "Задание «Какой код выгоднее?» 8 объектов: способ 1 (4 бита), способ 2 (3 бита). Какой экономнее? Почему 2 бита недостаточно?"],
        ["Кодирование и объём информации", "Высокий", "Задание «Экономный код». 10 команд робота: вперёд, назад, стоп, вправо, влево, звук, свет, пауза, старт, повтор. Найдите минимальную длину кода, составьте таблицу, объясните свободные комбинации."]
    ],
    8: [
        ["Системы счисления", "Базовый", "Задание «Разложи число по разрядам». Запишите 110101₂ в развёрнутой форме, переведите в десятичную систему."],
        ["Системы счисления", "Повышенный", "Задание «Ошибка в переводе». Ученик перевёл 101101₂ = 47₁₀. Проверьте, найдите ошибку (правильный ответ: 45₁₀), объясните причину."],
        ["Системы счисления", "Высокий", "Задание «Где запись короче?» Переведите 25, 64, 127, 255 из десятичной в 2, 8, 16 системы. Сравните длину записи, сделайте вывод."],
        ["Арифметические операции в системах счисления", "Базовый", "Задание «Сложение по правилам». Выполните сложение: 1011₂ + 1101₂. Запишите переносы по разрядам. Проверьте результат переводом в десятичную систему."],
        ["Арифметические операции в системах счисления", "Повышенный", "Задание «Ловушка переноса». Проверьте: 111₂ + 101₂ = 1010₂. Если неверно — исправьте и объясните ошибку."],
        ["Арифметические операции в системах счисления", "Высокий", "Задание «Создай проверочную карточку». Составьте три примера на двоичное сложение: простой, с одним переносом, с несколькими переносами. Подготовьте правильное решение и специально допущенную ошибку."],
        ["Элементы математической логики", "Базовый", "Задание «Высказывание или нет?» Определите: «Число 8 чётное»; «Откройте тетрадь»; «x > 5»; «Все двоичные числа состоят из 0 и 1». Можно ли определить истинность?"],
        ["Элементы математической логики", "Повышенный", "Задание «Смысл операции меняется». A = «ученик выполнил д/з», B = «ученик прошёл тест». Сравните A И B, A ИЛИ B, НЕ A. Объясните отличие логического «или» от бытового."],
        ["Элементы математической логики", "Высокий", "Задание «Построй правило допуска». В школьный медиаклуб допускаются: (кружок И разрешение) ИЛИ отдельное разрешение учителя. Обозначьте A, B, C, составьте выражение, таблицу истинности."]
    ],
    9: [
        ["Моделирование как метод познания", "Базовый", "Задание «Что является моделью?» Карта этажа, сам этаж, расписание, схема маршрута, фото класса, таблица дежурств. Заполните: объект – модель – какие свойства отражены."],
        ["Моделирование как метод познания", "Повышенный", "Задание «Одна ситуация – две модели». Маршрут от входа до кабинета (текст и схема). Сравните модели по удобству, точности, наглядности. Какая удобнее для нового ученика?"],
        ["Моделирование как метод познания", "Высокий", "Задание «Модель школьной библиотеки». Объекты: книга, автор, читатель, дата выдачи, срок возврата. Постройте модель (таблица или схема). Какие данные существенны?"],
        ["Табличные модели", "Базовый", "Задание «Таблица успеваемости». Дано: Аня (5 по инф., 4 по мат.); Игорь (4 по инф., 5 по мат.); Марина (5 по инф., 5 по мат.). Представьте данные в виде таблицы. Укажите строки, столбцы, заголовки."],
        ["Табличные модели", "Повышенный", "Задание «Какая таблица удобнее?» Две таблицы о кружках: (ученики-кружки) и (кружки-участники). Какая удобнее для поиска ученика, какая для анализа работы кружков?"],
        ["Табличные модели", "Высокий", "Задание «Спроектируй таблицу». Учёт оборудования: компьютеры, проектор, принтер, доска. Поля: номер, название, состояние, место, ответственный, дата проверки. Объясните выбор полей."],
        ["Графы", "Базовый", "Задание «Найди путь». На схеме кабинетов вершины – кабинеты, рёбра – переходы. От кабинета 12 до кабинета 28: сколько рёбер нужно пройти? Запишите один возможный путь."],
        ["Графы", "Повышенный", "Задание «Маршрут невозможен». Ученик построил маршрут: А–B–D–F. Проверьте по схеме. Найдите ошибку, предложите правильный маршрут. Почему граф удобен для проверки связей?"],
        ["Графы", "Высокий", "Задание «Построй граф связей». Школьная сеть: сервер, комп учителя, 3 уч. компьютера, принтер, роутер (≥6 вершин). Что произойдёт при отказе узла? Определите путь ученика к принтеру."]
    ]
};

function renderTasks(cls) {
    const container = document.getElementById('tasks-container');
    if (!container) return;
    container.innerHTML = '';
    const classes = cls === 'all' ? [7,8,9] : [parseInt(cls)];
    for (let c of classes) {
        if (!tasksData[c]) continue;
        let block = document.createElement('div');
        block.className = 'class-block';
        block.innerHTML = `<div class="class-title">✨ ${c} класс</div><table><thead><tr><th>📚 Тема</th><th>🎯 Уровень</th><th>📝 Задание</th><th></th></tr></thead><tbody></tbody>表`;
        let tbody = block.querySelector('tbody');
        for (let t of tasksData[c]) {
            let row = tbody.insertRow();
            row.insertCell(0).innerText = t[0];
            row.insertCell(1).innerHTML = `<span class="badge">${t[1]}</span>`;
            row.insertCell(2).innerText = t[2];
            let btnCell = row.insertCell(3);
            let btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.innerHTML = '📋';
            btn.onclick = (function(text, button) {
                return function() { copyText(text, button); };
            })(t[2], btn);
            btnCell.appendChild(btn);
        }
        container.appendChild(block);
    }
}

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTasks(btn.dataset.class);
    };
});
renderTasks('all');
</script>

<div style="position: fixed; bottom: 25px; right: 25px; z-index: 1000;" id="chatBot">
    <div id="chatIcon" style="background: linear-gradient(135deg, #c4a882, #a0845c); width: 65px; height: 65px; border-radius: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.15);"><i class="fas fa-feather-alt" style="color: white; font-size: 2rem;"></i></div>
    <div id="chatWindow" style="display: none; position: absolute; bottom: 75px; right: 0; width: 380px; background: #fffef8; border-radius: 32px; overflow: hidden; border: 1px solid #c4a882;">
        <div style="background: linear-gradient(135deg, #c4a882, #a0845c); padding: 15px 20px; color: white; display: flex; justify-content: space-between; font-weight: 800; font-size: 1.1rem;"><span><i class="fas fa-feather-alt"></i> Методический помощник</span><i class="fas fa-times" onclick="document.getElementById('chatWindow').style.display='none'" style="cursor:pointer"></i></div>
        <div id="chatMessages" style="height: 300px; overflow-y: auto; padding: 15px; background: #fefaf5;"><div style="background: #f0ebe5; color: #5c3d2e; padding: 12px 16px; border-radius: 24px; margin-bottom: 12px; max-width: 85%; font-size: 0.95rem; font-style: italic;">Здравствуйте! Чем могу помочь?</div></div>
        <div style="display: flex; padding: 12px; background: white; border-top: 1px solid #e8dfd3;"><input type="text" id="chatInput" placeholder="Напишите вопрос..." style="flex:1; padding: 12px 18px; border-radius: 50px; border: 1px solid #d4c4b0; font-family: 'Times New Roman', serif; font-size: 0.95rem;"><button onclick="sendMessage()" style="background: #c4a882; border: none; width: 48px; height: 48px; border-radius: 24px; cursor: pointer;"><i class="fas fa-paper-plane" style="color: white; font-size: 1.2rem;"></i></button></div>
    </div>
</div>
<script>
    document.getElementById('chatIcon').onclick = function() { const w = document.getElementById('chatWindow'); w.style.display = w.style.display === 'none' ? 'block' : 'none'; };
    function sendMessage() { const input = document.getElementById('chatInput'); const msg = input.value.trim(); if (!msg) return; const mDiv = document.getElementById('chatMessages'); mDiv.innerHTML += `<div style="background: #c4a882; color: white; padding: 10px 14px; border-radius: 20px; margin-bottom: 12px; margin-left: auto; max-width: 85%; font-size: 0.95rem; font-style: italic;">${msg}</div>`; input.value = ''; mDiv.scrollTop = mDiv.scrollHeight; setTimeout(() => { let r = ''; const q = msg.toLowerCase(); if (q.includes('7 класс')) r = '📚 В 7 классе: информация/данные, кодирование, алфавит. Задания с фильтром 7 класс.'; else if (q.includes('8 класс')) r = '🔢 8 класс: системы счисления и логические операции.'; else if (q.includes('9 класс')) r = '🍃 9 класс: моделирование, таблицы, графы.'; else r = '🕊️ Напишите "7 класс", "8 класс" или тему занятия.'; mDiv.innerHTML += `<div style="background: #f0ebe5; color: #5c3d2e; padding: 10px 14px; border-radius: 20px; margin-bottom: 12px; max-width: 85%; font-size: 0.95rem; font-style: italic;">🤍 ${r}</div>`; mDiv.scrollTop = mDiv.scrollHeight; }, 300); }
    document.getElementById('chatInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
